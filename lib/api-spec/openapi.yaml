openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: clubs
    description: Club list cache
  - name: squad
    description: Squad cache
  - name: Storage
    description: Object storage upload and serving endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /clubs:
    get:
      operationId: getClubs
      tags: [clubs]
      summary: Get cached club list
      description: Returns the cached club list from the database. Returns 204 if the cache is empty or stale (>30 days).
      responses:
        "200":
          description: Cached club list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubsResponse"
        "204":
          description: No valid cache available
    put:
      operationId: putClubs
      tags: [clubs]
      summary: Save club list to cache
      description: Saves the club list to the database cache, replacing any existing data.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PutClubsBody"
      responses:
        "200":
          description: Cache updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          description: Invalid request body
    delete:
      operationId: deleteClubs
      tags: [clubs]
      summary: Clear club list cache
      description: Deletes all clubs from the database cache.
      responses:
        "200":
          description: Cache cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /squad/{teamId}:
    get:
      operationId: getSquad
      tags: [squad]
      summary: Get cached squad
      description: Returns the cached squad for a team. Returns 204 if the cache is empty or stale (>7 days).
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cached squad
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SquadResponse"
        "204":
          description: No valid cache available
        "400":
          description: Invalid teamId
    put:
      operationId: putSquad
      tags: [squad]
      summary: Save squad to cache
      description: Saves or updates the squad for a team in the database cache.
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PutSquadBody"
      responses:
        "200":
          description: Cache updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          description: Invalid request body

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestUploadUrlBody'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestUploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
        '500':
          description: Failed to generate upload URL.

  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.
        '500':
          description: Failed to serve object.

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ClubEntry:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        logo:
          type: string
        league:
          type: string
        leagueId:
          type: integer
        country:
          type: string
      required:
        - id
        - name
        - logo
        - league
        - leagueId

    ClubsResponse:
      type: object
      properties:
        clubs:
          type: array
          items:
            $ref: "#/components/schemas/ClubEntry"
        cachedAt:
          type: integer
      required:
        - clubs
        - cachedAt

    PutClubsBody:
      type: object
      properties:
        clubs:
          type: array
          items:
            $ref: "#/components/schemas/ClubEntry"
        cachedAt:
          type: integer
      required:
        - clubs
        - cachedAt

    SquadPlayer:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        age:
          type: integer
        position:
          type: string
        positionPtBr:
          type: string
        photo:
          type: string
        number:
          type: integer
      required:
        - id
        - name
        - age
        - position
        - positionPtBr
        - photo

    SquadResponse:
      type: object
      properties:
        players:
          type: array
          items:
            $ref: "#/components/schemas/SquadPlayer"
        source:
          type: string
        cachedAt:
          type: integer
      required:
        - players
        - source
        - cachedAt

    PutSquadBody:
      type: object
      properties:
        players:
          type: array
          items:
            $ref: "#/components/schemas/SquadPlayer"
        source:
          type: string
        cachedAt:
          type: integer
      required:
        - players
        - source
        - cachedAt

    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
        count:
          type: integer
      required:
        - ok

    RequestUploadUrlBody:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1

    RequestUploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string
        metadata:
          $ref: '#/components/schemas/RequestUploadUrlBody'
