<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    background: #030208;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .poster {
    width: 810px;
    height: 1012px;
    flex-shrink: 0;
    position: relative;
    background: radial-gradient(ellipse 70% 55% at 50% 35%, #1e0c40 0%, #0d0520 40%, #060410 70%, #030208 100%);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;

    /* Scale to fit viewport height */
    transform-origin: center center;
    transform: scale(var(--s, 1));
  }
  .glow-top {
    position: absolute;
    top: -80px; left: 50%; transform: translateX(-50%);
    width: 560px; height: 500px;
    background: radial-gradient(ellipse, rgba(110,50,220,0.24) 0%, transparent 70%);
    pointer-events: none;
  }
  .glow-bottom {
    position: absolute;
    bottom: 160px; left: 50%; transform: translateX(-50%);
    width: 700px; height: 200px;
    background: radial-gradient(ellipse, rgba(90,30,180,0.14) 0%, transparent 70%);
    pointer-events: none;
  }
  .particle {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.7);
  }

  /* DEVICES */
  .devices {
    position: relative;
    width: 810px;
    height: 560px;
    margin-top: 44px;
    flex-shrink: 0;
  }

  /* LAPTOP */
  .laptop-wrap {
    position: absolute;
    left: 16px;
    top: 50px;
    transform: perspective(1000px) rotateY(10deg) rotateX(1deg);
    transform-origin: center center;
    filter: drop-shadow(0 20px 50px rgba(80,20,200,0.38)) drop-shadow(0 0 80px rgba(60,10,160,0.22));
  }
  .laptop-screen-outer {
    width: 468px;
    height: 294px;
    background: #090909;
    border-radius: 10px 10px 0 0;
    border: 8px solid #1f1f1f;
    border-bottom: none;
    position: relative;
    overflow: hidden;
  }
  .laptop-webcam {
    position: absolute;
    top: 5px; left: 50%; transform: translateX(-50%);
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #181818;
    z-index: 10;
  }
  .laptop-screen-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top left;
    display: block;
  }
  .laptop-screen-outer::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.025) 0%, transparent 55%);
    pointer-events: none;
    z-index: 5;
  }
  .laptop-hinge {
    width: 468px;
    height: 8px;
    background: linear-gradient(to bottom, #252525, #1a1a1a);
  }
  .laptop-base {
    width: 488px;
    height: 18px;
    background: linear-gradient(to bottom, #1c1c1c 0%, #131313 100%);
    border-radius: 0 0 5px 5px;
    margin-left: -10px;
  }
  .laptop-foot {
    width: 488px;
    height: 5px;
    background: #0b0b0b;
    border-radius: 0 0 5px 5px;
    margin-left: -10px;
  }

  /* PHONE */
  .phone-wrap {
    position: absolute;
    right: 52px;
    top: 12px;
    filter: drop-shadow(0 20px 50px rgba(80,20,200,0.42)) drop-shadow(0 0 60px rgba(60,10,160,0.28));
  }
  .phone {
    width: 190px;
    height: 412px;
    background: #0c0c0c;
    border-radius: 34px;
    border: 7px solid #1c1c1c;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  /* Dynamic Island style — no protruding camera */
  .phone-island {
    width: 76px;
    height: 22px;
    background: #0c0c0c;
    border-radius: 0 0 16px 16px;
    position: relative;
    z-index: 10;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }
  .phone-island::before {
    content: '';
    width: 9px; height: 9px;
    border-radius: 50%;
    background: #141414;
    box-shadow: inset 0 0 0 1.5px #1f1f1f;
  }
  .phone-island::after {
    content: '';
    width: 28px; height: 6px;
    border-radius: 3px;
    background: #141414;
  }
  .phone-screen {
    flex: 1;
    width: 100%;
    overflow: hidden;
  }
  .phone-screen img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    display: block;
  }
  .phone::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 5;
    border-radius: 28px;
  }

  .floor-glow {
    position: absolute;
    bottom: 8px;
    left: 50%; transform: translateX(-50%);
    width: 600px;
    height: 28px;
    background: radial-gradient(ellipse, rgba(100,40,200,0.22) 0%, transparent 70%);
    filter: blur(14px);
  }

  /* DIVIDER */
  .divider {
    width: 160px;
    height: 2px;
    background: linear-gradient(to right, transparent, #c8a800, transparent);
    margin: 0 auto 22px;
    border-radius: 2px;
    box-shadow: 0 0 14px rgba(200,168,0,0.55);
    flex-shrink: 0;
  }

  /* TEXT */
  .text-section {
    padding: 0 50px 26px;
    text-align: center;
    flex-shrink: 0;
    margin-top: auto;
  }
  .headline {
    font-family: 'Arial Black', 'Impact', sans-serif;
    font-size: 52px;
    font-weight: 900;
    font-style: italic;
    color: #fff;
    line-height: 1.0;
    letter-spacing: -1px;
    text-transform: uppercase;
    text-shadow: 0 2px 28px rgba(110,50,220,0.38);
    margin-bottom: 14px;
  }
  .sub {
    font-family: 'Arial', sans-serif;
    font-size: 12px;
    font-weight: 400;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2.5px;
    text-transform: uppercase;
    margin-bottom: 22px;
  }
  .logo {
    font-family: 'Arial', sans-serif;
    font-size: 9px;
    font-weight: 700;
    color: rgba(255,255,255,0.22);
    letter-spacing: 5px;
    text-transform: uppercase;
  }
  .logo span { color: rgba(200,168,0,0.6); }
</style>
<script>
  // Auto-scale poster to fit viewport
  window.addEventListener('DOMContentLoaded', function() {
    var poster = document.querySelector('.poster');
    var scaleH = window.innerHeight / 1012;
    var scaleW = window.innerWidth / 810;
    var scale = Math.min(scaleH, scaleW, 1);
    poster.style.transform = 'scale(' + scale + ')';
  });
</script>
</head>
<body>
<div class="poster">
  <div class="glow-top"></div>
  <div class="glow-bottom"></div>

  <div class="particle" style="width:2px;height:2px;top:7%;left:11%;opacity:.7"></div>
  <div class="particle" style="width:3px;height:3px;top:13%;left:23%;opacity:.5"></div>
  <div class="particle" style="width:2px;height:2px;top:6%;left:81%;opacity:.6"></div>
  <div class="particle" style="width:2px;height:2px;top:18%;left:90%;opacity:.4"></div>
  <div class="particle" style="width:3px;height:3px;top:4%;left:62%;opacity:.5"></div>
  <div class="particle" style="width:2px;height:2px;top:45%;left:7%;opacity:.35"></div>
  <div class="particle" style="width:1px;height:1px;top:10%;left:43%;opacity:.8"></div>
  <div class="particle" style="width:2px;height:2px;top:29%;left:56%;opacity:.3"></div>
  <div class="particle" style="width:2px;height:2px;top:51%;left:92%;opacity:.3"></div>

  <div class="devices">
    <div class="laptop-wrap">
      <div class="laptop-screen-outer">
        <div class="laptop-webcam"></div>
        <img class="laptop-screen-img" src="/poster-laptop.png" alt="app" />
      </div>
      <div class="laptop-hinge"></div>
      <div class="laptop-base"></div>
      <div class="laptop-foot"></div>
    </div>

    <div class="phone-wrap">
      <div class="phone">
        <div class="phone-island"></div>
        <div class="phone-screen">
          <img src="/poster-phone.png" alt="phone" />
        </div>
      </div>
    </div>

    <div class="floor-glow"></div>
  </div>

  <div class="divider"></div>

  <div class="text-section">
    <div class="headline">O Modo Carreira<br>Que Você Merecia</div>
    <div class="sub">Partidas · Notícias por IA · Stats Completos</div>
    <div class="logo"><span>FC</span> Career Manager</div>
  </div>
</div>
</body>
</html>
